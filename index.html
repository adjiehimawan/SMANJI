<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Kelulusan</title>
    <link rel="icon" type="image/jpeg" href="https://adjiehimawan.github.io/cdnty/logo%20smanji.jpg">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --primary-dark: #4facfe;
            --success: #00e676;
            --danger: #ff4b4b;
            --text: #ffffff;
            --bg-dark: #0f172a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% -20%, #1e293b, var(--bg-dark));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Ambient Glow Background */
        body::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 40vw;
            height: 40vw;
            background: var(--primary-dark);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
        }

        .container {
            width: 100%;
            max-width: 600px;
            perspective: 1000px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .header-logo {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.1);
            animation: float 3s ease-in-out infinite;
            background-color: white;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        /* Countdown Styles */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 10px;
            min-width: 80px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02);
            transition: transform 0.3s;
        }

        .time-box:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .time-box span.num {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .time-box span.text {
            font-size: 0.75rem;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Form Elements */
        .form-group {
            position: relative;
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            padding: 16px 20px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
            outline: none;
            letter-spacing: 2px;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        input::placeholder {
            color: #475569;
            letter-spacing: normal;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Result Styles */
        .result {
            display: none;
            margin-top: 20px;
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .cert {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .cert::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
        }

        .cert.lulus::before {
            background: var(--success);
        }

        .cert.tidak::before {
            background: var(--danger);
        }

        .cert-header {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.5;
        }

        .student-name {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-badge {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .lulus .status-badge {
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
            border: 1px solid rgba(0, 230, 118, 0.4);
            box-shadow: 0 0 25px rgba(0, 230, 118, 0.2);
        }

        .tidak .status-badge {
            background: rgba(255, 75, 75, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 75, 75, 0.4);
            box-shadow: 0 0 25px rgba(255, 75, 75, 0.2);
        }

        .message {
            font-size: 1rem;
            color: #cbd5e1;
            font-style: italic;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .signature {
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
            padding-top: 25px;
            text-align: right;
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.6;
        }

        .signature-name {
            font-weight: 800;
            color: white;
            margin-top: 45px;
            font-size: 1.1rem;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        /* Loading Overlay */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 242, 254, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: white;
            font-weight: 600;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
            text-transform: uppercase;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }

            .time-box {
                min-width: 65px;
                padding: 12px 5px;
            }

            .time-box span.num {
                font-size: 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .student-name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card" id="mainCard">
            <img src="https://adjiehimawan.github.io/cdnty/logo%20smanji.jpg" alt="Logo SMANJI" class="header-logo">
            <h1>PENGUMUMAN KELULUSAN</h1>
            <div class="subtitle" id="subtitle">Memuat informasi sistem...</div>

            <div id="countdownWrapper" style="display: none;">
                <div class="countdown-container" id="countdownBox">
                    <div class="time-box"><span class="num">00</span><span class="text">Hari</span></div>
                    <div class="time-box"><span class="num">00</span><span class="text">Jam</span></div>
                    <div class="time-box"><span class="num">00</span><span class="text">Mnt</span></div>
                    <div class="time-box"><span class="num">00</span><span class="text">Dtk</span></div>
                </div>
                <p style="font-size: 0.95rem; color: #94a3b8; margin-bottom: 20px;" id="countdownMsg">Pengumuman akan
                    dibuka dalam waktu di atas</p>
            </div>

            <div id="formBox" style="display: none;">
                <p style="color: #cbd5e1; margin-bottom: 15px; font-size: 0.95rem;">Silakan masukkan Nomor Ujian / Token
                    Anda</p>
                <div class="form-group">
                    <input type="text" id="token" placeholder="Contoh: 123456" autocomplete="off">
                </div>
                <button onclick="cekHasil()">LIHAT HASIL</button>
            </div>

            <div id="output" class="result"></div>

            <button id="btnKembali"
                style="display: none; margin-top: 25px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); box-shadow: none;"
                onclick="resetForm()">KEMBALI PENCARIAN</button>
        </div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Memverifikasi Data...</div>
    </div>

    <script>
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        const SCRIPT_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMXyM90Ee0W30wcG3t0GF1UsLNJDxIT0_aSrpKiFLnoY2fH3pk4LzvDwThoyVgonccmKcggf5ayFQSjaC42nUDKlgdZbt0YYL-WsabhILg36lZAHDZ_Tvnu3Ac-sG7thxp0bcfnFsTBfmm42bra-pdSlqAN75MANBUfcKj_JeSfx-H4GXiho0aUI1x98Te_eS9HEqDOhy2htt7voCPjs9uWtXroGvjNoGqO1-IBMTf_AfZdELqyE04qUggSlSKztD_Ldv79w57K84mFZ-hYFoW2Pvg5I8A&lib=MVySug_vsR6UH3epPs3or1LtoZ2vwsE1i";

        const loading = document.getElementById("loading");
        const formBox = document.getElementById("formBox");
        const countdownWrapper = document.getElementById("countdownWrapper");
        const output = document.getElementById("output");
        const btnKembali = document.getElementById("btnKembali");
        const subtitle = document.getElementById("subtitle");

        function showLoading() { loading.style.display = "flex"; }
        function hideLoading() { loading.style.display = "none"; }

        function cekHasil() {
            let token = document.getElementById("token").value.trim();
            if (!token) { 
                alert("Nomor Ujian / Token wajib diisi!"); 
                document.getElementById("token").focus();
                return; 
            }

            showLoading();

            fetch(`${SCRIPT_URL}?action=cek&token=${encodeURIComponent(token)}`)
                .then(response => response.json())
                .then(res => {
                    hideLoading();
                    if (!res) return;

                    let info = res.info || {};
                    
                    formBox.style.display = "none";
                    countdownWrapper.style.display = "none";
                    btnKembali.style.display = "block";

                    if (!res.status) {
                        output.className = "result cert tidak";
                        output.innerHTML = `
                            <div class="cert-header">Pemberitahuan Sistem</div>
                            <div class="status-badge">TIDAK DITEMUKAN</div>
                            <p class="message" style="color: #cbd5e1;">Maaf, Nomor Ujian <b>${token}</b> tidak terdaftar dalam database kami. Silakan periksa kembali penulisan nomor ujian Anda.</p>
                        `;
                        output.style.display = "block";
                        return;
                    }

                    if (res.kelulusan === "LULUS") {
                        confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#00f2fe', '#4facfe', '#00e676', '#ffffff'] });
                        output.className = "result cert lulus";
                        output.innerHTML = `
                            <div class="cert-header">SURAT KETERANGAN LULUS<br><strong style="color:white; font-size: 1.1rem; margin-top: 5px; display:inline-block;">${info.sekolah || ''}</strong></div>
                            <div style="font-size: 0.95rem; color: #94a3b8; margin-bottom: 5px;">Nama Peserta Didik:</div>
                            <div class="student-name">${res.nama}</div>
                            <div class="status-badge">L U L U S</div>
                            <div class="message">"${info.pesan || 'Selamat atas kelulusan Anda! Semoga sukses di jenjang selanjutnya.'}"</div>
                            
                            <div class="signature">
                                Ditetapkan di: Labuhan Haji<br>
                                Pada Tanggal: ${info.tanggal || '-'}
                                <div class="signature-name">${info.kepala_sekolah || 'Kepala Sekolah'}</div>
                                <div>NIP. ${info.nip || '-'}</div>
                            </div>
                        `;
                    } else {
                        output.className = "result cert tidak";
                        output.innerHTML = `
                            <div class="cert-header">HASIL PENGUMUMAN<br><strong style="color:white; font-size: 1.1rem; margin-top: 5px; display:inline-block;">${info.sekolah || ''}</strong></div>
                            <div style="font-size: 0.95rem; color: #94a3b8; margin-bottom: 5px;">Nama Peserta Didik:</div>
                            <div class="student-name">${res.nama}</div>
                            <div class="status-badge">TIDAK LULUS</div>
                            <div class="message">Jangan patah semangat. Perjalanan Anda masih panjang. Teruslah belajar dan berjuang untuk meraih cita-cita!</div>
                        `;
                    }
                    output.style.display = "block";
                })
                .catch(error => {
                    hideLoading();
                    alert("Terjadi kesalahan jaringan. Pastikan URL Web App sudah benar.");
                    console.error("Fetch Error:", error);
                });
        }

        function resetForm() {
            output.style.display = "none";
            btnKembali.style.display = "none";
            document.getElementById("token").value = "";
            formBox.style.display = "block";
        }

        function startCountdown(targetTime) {
            countdownWrapper.style.display = "block";
            let box = document.getElementById("countdownBox");
            let msg = document.getElementById("countdownMsg");

            let timer = setInterval(function () {
                let now = new Date().getTime();
                let d = targetTime - now;

                if (d <= 0) {
                    clearInterval(timer);
                    countdownWrapper.style.display = "none";
                    formBox.style.display = "block";
                    return;
                }

                let hari = Math.floor(d / (1000 * 60 * 60 * 24));
                let jam = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let menit = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
                let detik = Math.floor((d % (1000 * 60)) / 1000);

                hari = hari < 10 ? "0" + hari : hari;
                jam = jam < 10 ? "0" + jam : jam;
                menit = menit < 10 ? "0" + menit : menit;
                detik = detik < 10 ? "0" + detik : detik;

                box.innerHTML = `
                    <div class="time-box"><span class="num">${hari}</span><span class="text">Hari</span></div>
                    <div class="time-box"><span class="num">${jam}</span><span class="text">Jam</span></div>
                    <div class="time-box"><span class="num">${menit}</span><span class="text">Mnt</span></div>
                    <div class="time-box"><span class="num">${detik}</span><span class="text">Dtk</span></div>
                `;
            }, 1000);
        }

        window.onload = function () {
            // Tampilkan loading saat initial load
            showLoading();
            
            fetch(`${SCRIPT_URL}?action=init`)
                .then(response => response.json())
                .then(res => {
                    hideLoading();
                    
                    if (res && res.info) {
                        if(res.info.tahun) {
                            subtitle.innerText = "Tahun Pelajaran " + res.info.tahun;
                        } else {
                            subtitle.innerText = "Sistem Verifikasi Online";
                        }
                        
                        if (res.info.countdown) {
                            let target = new Date(res.info.countdown);

                            if (!isNaN(target.getTime())) {
                                let now = new Date().getTime();
                                if (target.getTime() > now) {
                                    startCountdown(target.getTime());
                                } else {
                                    // Waktu sudah lewat, langsung tampilkan form
                                    formBox.style.display = "block";
                                }
                            } else {
                                document.getElementById("countdownMsg").innerHTML = "<span style='color:var(--danger)'>⚠️ Jadwal belum diset dengan benar</span>";
                                countdownWrapper.style.display = "block";
                                formBox.style.display = "block";
                            }
                        } else {
                            // Tidak ada countdown set, langsung form
                            formBox.style.display = "block";
                        }
                    } else {
                        subtitle.innerText = "Data tidak valid dari server";
                    }
                })
                .catch(error => {
                    hideLoading();
                    subtitle.innerText = "Koneksi ke server gagal. Cek SCRIPT_URL.";
                    console.error("Init Error:", error);
                });
            
            // Enter key trigger
            document.getElementById("token").addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    cekHasil();
                }
            });
        };
    </script>
</body>

</html>
